<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobMailer — Bulk Email Sender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #08090d; --bg2: #0e1117; --bg3: #161b26; --bg4: #1e2536;
      --surface: #141924; --border: #222d40; --border-h: #334155;
      --text: #e2e8f0; --text2: #8b9dc3; --text3: #4f6085;
      --accent: #2563eb; --accent2: #60a5fa;
      --accent-bg: rgba(37,99,235,0.08); --accent-border: rgba(37,99,235,0.25);
      --green: #10b981; --green-bg: rgba(16,185,129,0.08); --green-border: rgba(16,185,129,0.25);
      --red: #ef4444; --red-bg: rgba(239,68,68,0.08); --red-border: rgba(239,68,68,0.25);
      --amber: #f59e0b; --amber-bg: rgba(245,158,11,0.08); --amber-border: rgba(245,158,11,0.25);
      --violet: #8b5cf6; --violet-bg: rgba(139,92,246,0.08); --violet-border: rgba(139,92,246,0.25);
      --radius: 10px; --radius-sm: 7px;
      --font: 'DM Sans', -apple-system, sans-serif; --mono: 'JetBrains Mono', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; overflow: hidden; }

    /* ─── Auth Screen ─── */
    .auth-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 30% 20%, rgba(37,99,235,.12), transparent 60%),
                  radial-gradient(circle at 70% 80%, rgba(139,92,246,.10), transparent 60%),
                  var(--bg);
      padding: 20px; overflow-y: auto;
    }
    .auth-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 36px; width: 100%; max-width: 420px;
      box-shadow: 0 12px 60px rgba(0,0,0,.4);
    }
    .auth-brand {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 6px;
    }
    .auth-brand svg { color: var(--accent2); }
    .auth-brand h1 {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent2), var(--violet));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .auth-tagline {
      text-align: center; font-size: 11px; color: var(--text3);
      font-family: var(--mono); letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 28px;
    }
    .auth-title { font-size: 19px; font-weight: 600; margin-bottom: 4px; }
    .auth-subtitle { font-size: 13px; color: var(--text3); margin-bottom: 22px; }
    .auth-tabs {
      display: flex; gap: 4px; background: var(--bg);
      padding: 4px; border-radius: 8px; margin-bottom: 22px;
    }
    .auth-tab {
      flex: 1; padding: 8px; text-align: center; cursor: pointer;
      border-radius: 6px; font-size: 13px; font-weight: 600;
      color: var(--text3); transition: all .12s;
    }
    .auth-tab.active { background: var(--bg3); color: var(--text); }
    .auth-link {
      font-size: 12.5px; color: var(--accent2); cursor: pointer; text-decoration: none;
    }
    .auth-link:hover { text-decoration: underline; }
    .auth-footer {
      text-align: center; margin-top: 18px; font-size: 12px; color: var(--text3);
    }

    /* ─── App Layout ─── */
    .app { display: flex; height: 100vh; }
    .sidebar {
      width: 230px; min-width: 230px; background: var(--bg2);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
    }
    .brand { padding: 22px 18px 18px; border-bottom: 1px solid var(--border); }
    .brand h1 { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 9px; }
    .brand h1 svg { color: var(--accent2); }
    .brand-gradient { background: linear-gradient(135deg, var(--accent2), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .brand-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px; }

    .nav { padding: 14px 10px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 11px; padding: 10px 13px;
      border-radius: var(--radius-sm); cursor: pointer; font-size: 13px;
      font-weight: 500; color: var(--text2); border: 1px solid transparent;
      transition: all .12s;
    }
    .nav-item:hover { background: var(--bg3); color: var(--text); }
    .nav-item.active { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent-border); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 9px; font-family: var(--mono); }

    .sidebar-footer {
      padding: 14px 16px; border-top: 1px solid var(--border);
    }
    .user-info {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
      padding: 8px; background: var(--bg); border-radius: 8px; cursor: pointer;
      transition: all .12s;
    }
    .user-info:hover { background: var(--bg3); }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--violet));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 13px; flex-shrink: 0;
    }
    .user-meta { flex: 1; overflow: hidden; }
    .user-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-email { font-size: 10.5px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .status-row {
      display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text3);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
    .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* ─── Main Content ─── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      padding: 14px 28px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg2);
    }
    .topbar h2 { font-size: 18px; font-weight: 600; letter-spacing: -.3px; }
    .content { flex: 1; overflow-y: auto; padding: 24px 28px; }

    /* ─── Common ─── */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 18px; }
    .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .card-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 9px; }
    .card-title svg { width: 18px; height: 18px; color: var(--accent2); }

    .btn {
      display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px;
      border-radius: var(--radius-sm); font-size: 12.5px; font-weight: 600;
      font-family: var(--font); border: 1px solid var(--border);
      background: var(--surface); color: var(--text); cursor: pointer;
      transition: all .12s; white-space: nowrap;
    }
    .btn:hover { background: var(--bg3); border-color: var(--border-h); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn svg { width: 15px; height: 15px; }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }
    .btn-danger:hover { background: rgba(239,68,68,.14); }
    .btn-sm { padding: 5px 11px; font-size: 11.5px; }
    .btn-ghost { background: transparent; border-color: transparent; }
    .btn-ghost:hover { background: var(--bg3); }
    .btn-block { width: 100%; justify-content: center; padding: 11px; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 10.5px; font-weight: 600; color: var(--text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .6px; font-family: var(--mono); }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 9px 13px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); font-size: 13px; font-family: var(--font);
      transition: border .12s; outline: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
    .form-textarea { resize: vertical; min-height: 140px; line-height: 1.65; }
    .form-select { cursor: pointer; appearance: none; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 10px; font-size: 10.5px; font-weight: 600; }
    .tag-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .tag-red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
    .tag-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
    .tag-blue { background: var(--accent-bg); color: var(--accent2); border: 1px solid var(--accent-border); }

    .presets { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .preset { padding: 7px 15px; border-radius: 18px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--text2); transition: all .12s; }
    .preset:hover { border-color: var(--border-h); }
    .preset.active { color: #fff; }

    .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 44px 20px; text-align: center; cursor: pointer; transition: all .15s; background: var(--bg); }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-bg); }
    .upload-icon { margin: 0 auto 14px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent-bg); display: flex; align-items: center; justify-content: center; color: var(--accent); }
    .upload-zone h3 { font-size: 14px; margin-bottom: 4px; }
    .upload-zone p { font-size: 12px; color: var(--text3); }

    .tbl-wrap { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .tbl th { background: var(--bg3); padding: 9px 13px; text-align: left; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--text3); font-family: var(--mono); white-space: nowrap; position: sticky; top: 0; }
    .tbl td { padding: 8px 13px; border-top: 1px solid var(--border); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tbl tr:hover td { background: rgba(255,255,255,.02); }
    .cb { width: 16px; height: 16px; border: 2px solid var(--border-h); border-radius: 4px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all .12s; background: transparent; flex-shrink: 0; }
    .cb.on { background: var(--accent); border-color: var(--accent); }

    .tpl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 18px; }
    .tpl-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: all .12s; }
    .tpl-card:hover { border-color: var(--border-h); }
    .tpl-card.active { border-color: var(--accent); background: var(--accent-bg); }
    .tpl-card h4 { font-size: 13px; margin-bottom: 4px; }
    .tpl-card p { font-size: 11.5px; color: var(--text3); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--text3); font-family: var(--mono); margin-bottom: 6px; }
    .stat-val { font-size: 26px; font-weight: 700; letter-spacing: -1px; }

    .prog-wrap { height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; margin: 10px 0; }
    .prog-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--violet)); border-radius: 3px; transition: width .3s; }

    .log { max-height: 320px; overflow-y: auto; font-family: var(--mono); font-size: 11px; background: var(--bg); border-radius: var(--radius-sm); padding: 12px; border: 1px solid var(--border); }
    .log-row { padding: 3px 0; display: flex; gap: 10px; }
    .log-time { color: var(--text3); min-width: 70px; }
    .log-row.ok .log-msg { color: var(--green); }
    .log-row.err .log-msg { color: var(--red); }
    .log-row.info .log-msg { color: var(--text2); }

    .preview { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
    .preview-subj { font-size: 15px; font-weight: 600; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .preview-body { white-space: pre-wrap; font-size: 13px; line-height: 1.7; color: var(--text2); }

    .vars { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .var-chip { padding: 3px 9px; background: var(--violet-bg); border: 1px solid var(--violet-border); border-radius: 5px; font-size: 10.5px; font-family: var(--mono); color: var(--violet); cursor: pointer; transition: all .12s; }
    .var-chip:hover { background: rgba(139,92,246,.15); }

    .alert-box { display: flex; align-items: center; gap: 10px; padding: 11px 16px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 10px; font-size: 12.5px; }
    .alert-box svg { width: 16px; height: 16px; flex-shrink: 0; }
    .alert-box.err { border-color: var(--red-border); color: var(--red); }
    .alert-box.warn { border-color: var(--amber-border); color: var(--amber); }
    .alert-box.ok { border-color: var(--green-border); color: var(--green); }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeIn .12s; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); width: 540px; max-height: 82vh; overflow-y: auto; padding: 24px; box-shadow: 0 8px 40px rgba(0,0,0,.4); animation: slideUp .18s; }
    .modal h3 { font-size: 16px; margin-bottom: 18px; }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }

    .delay-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .delay-row label { font-size: 12px; font-weight: 600; color: var(--text2); white-space: nowrap; }
    .delay-row input { width: 60px; padding: 5px 8px; background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; outline: none; text-align: center; }
    .delay-row .hint { font-size: 10.5px; color: var(--text3); }

    .att-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 12px; margin-top: 8px; }
    .att-row .att-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .toasts { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; }
    .toast { padding: 10px 18px; border-radius: var(--radius-sm); font-size: 12.5px; font-weight: 500; animation: slideUp .15s; box-shadow: 0 4px 20px rgba(0,0,0,.3); display: flex; align-items: center; gap: 9px; max-width: 350px; }
    .toast svg { width: 15px; height: 15px; flex-shrink: 0; }
    .toast-ok { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
    .toast-err { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }
    .toast-info { background: var(--accent-bg); border: 1px solid var(--accent-border); color: var(--accent2); }

    .empty { text-align: center; padding: 50px 20px; color: var(--text3); }
    .empty h3 { font-size: 15px; color: var(--text2); margin-bottom: 6px; }
    .empty p { font-size: 12.5px; max-width: 380px; margin: 0 auto; line-height: 1.6; }

    .help-tip { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 50%; background: var(--bg3); color: var(--text3); font-size: 9px; font-weight: 700; cursor: help; margin-left: 5px; }
    .password-strength { height: 3px; background: var(--bg); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .password-strength-bar { height: 100%; transition: all .2s; border-radius: 2px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .hidden { display: none !important; }

    @media (max-width: 768px) {
      .sidebar { width: 60px; min-width: 60px; }
      .brand h1 span, .brand-sub, .nav-item span:not(.nav-badge), .user-meta, .status-row span { display: none; }
      .nav-item { justify-content: center; padding: 10px; }
      .brand { padding: 16px 12px; justify-content: center; display: flex; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .content { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!-- AUTH SCREEN (login / signup / forgot password)                           -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-brand">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg>
      <h1>JobMailer</h1>
    </div>
    <p class="auth-tagline">Bulk Email · Smart Outreach</p>

    <div id="authBody"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!-- MAIN APP                                                                  -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div id="appScreen" class="app hidden">
  <div class="sidebar">
    <div class="brand">
      <h1>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg>
        <span class="brand-gradient">JobMailer</span>
      </h1>
      <p class="brand-sub">Bulk Email Sender</p>
    </div>
    <div class="nav">
      <div class="nav-item active" data-tab="setup" onclick="switchTab('setup')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Mail Setup</span>
      </div>
      <div class="nav-item" data-tab="contacts" onclick="switchTab('contacts')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Contacts</span>
        <span class="nav-badge hidden" id="contactBadge">0</span>
      </div>
      <div class="nav-item" data-tab="templates" onclick="switchTab('templates')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span>Templates</span>
      </div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════════════════
const state = {
  user: null,
  tab: 'setup',
  smtp: { host:'', port:'587', encryption:'TLS', email:'', password:'', fromName:'', preset:'' },
  connected: false,
  contacts: [],
  columns: [],
  emailColumn: '',
  selected: new Set(),
  templates: [],
  activeTemplate: null,
  variables: {},
  delaySeconds: 5,
  sending: { active:false, progress:0, total:0, sent:0, failed:0, logs:[] },
  attachments: [],
};

const PRESETS = {
  gmail:   { host:'smtp.gmail.com', port:'587', encryption:'TLS', label:'Gmail',   color:'#EA4335' },
  outlook: { host:'smtp.office365.com', port:'587', encryption:'TLS', label:'Outlook', color:'#0078D4' },
  yahoo:   { host:'smtp.mail.yahoo.com', port:'465', encryption:'SSL', label:'Yahoo',   color:'#6001D2' },
  zoho:    { host:'smtp.zoho.com', port:'587', encryption:'TLS', label:'Zoho',    color:'#E8403A' },
  custom:  { host:'', port:'587', encryption:'TLS', label:'Custom', color:'#64748b' },
};

const DEFAULT_TEMPLATES = [
  { id:'t_default_1', name:'Cold Application',
    subject:'Application for {{position}} — {{yourName}}',
    body:'Dear {{recipientName}},\n\nI hope this message finds you well. I am writing to express my strong interest in the {{position}} role at {{company}}.\n\nWith {{experience}} of experience in {{skills}}, I am confident I can contribute meaningfully to your team.\n\nI have attached my resume for your review.\n\nBest regards,\n{{yourName}}' },
  { id:'t_default_2', name:'Referral Follow-up',
    subject:'Referred by {{referrer}} — {{position}} Interest',
    body:'Dear {{recipientName}},\n\n{{referrer}} suggested I reach out regarding the {{position}} opening at {{company}}.\n\nMy experience in {{skills}} has prepared me well for this role.\n\nWarm regards,\n{{yourName}}' },
  { id:'t_default_3', name:'Networking Introduction',
    subject:'Quick Introduction — {{yourName}}',
    body:'Hi {{recipientName}},\n\nI\'m {{yourName}}, a {{yourTitle}}. I came across {{company}} and was impressed by your work.\n\nWould you have 15 minutes for a quick chat?\n\nThanks,\n{{yourName}}' },
];

const titles = { setup:'Mail Setup', contacts:'Contacts', templates:'Templates', send:'Send Emails' };

// ═══════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const esc = s => { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; };

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type==='success'?'ok':type==='error'?'err':'info'}`;
  const icons = {
    success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>',
    error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>',
    info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 10 10-12h-9l1-10z"/></svg>'
  };
  el.innerHTML = `${icons[type]||icons.info} ${msg}`;
  $('#toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function api(url, opts = {}) {
  const res = await fetch(url, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts,
  });
  let data;
  try { data = await res.json(); } catch { data = {}; }
  if (!res.ok) throw new Error(data.error || data.details || `HTTP ${res.status}`);
  return data;
}

function fillTemplate(text, data) {
  if (!text) return '';
  return text.replace(/\{\{(\w+)\}\}/g, (m, k) => {
    if (data[k] !== undefined && data[k] !== '') return data[k];
    if (state.variables[k] !== undefined && state.variables[k] !== '') return state.variables[k];
    return m;
  });
}

function getVars(text) {
  const m = (text || '').match(/\{\{(\w+)\}\}/g);
  return m ? [...new Set(m.map(v => v.replace(/[{}]/g,'')))] : [];
}

function passwordStrength(pw) {
  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
  if (/\d/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  return Math.min(score, 4);
}

// ═══════════════════════════════════════════════════════════════════════════
// AUTH SCREENS
// ═══════════════════════════════════════════════════════════════════════════

function renderAuth(mode = 'login') {
  const body = $('#authBody');

  if (mode === 'login') {
    body.innerHTML = `
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Log in to continue your job search</p>
      <div class="auth-tabs">
        <div class="auth-tab active">Log In</div>
        <div class="auth-tab" onclick="renderAuth('signup')">Sign Up</div>
      </div>
      <form id="loginForm">
        <div class="form-group">

          <input class="form-input" type="email" id="loginEmail" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="loginPass" required autocomplete="current-password">
        </div>
        <div style="text-align:right;margin-bottom:14px">
          <span class="auth-link" onclick="renderAuth('forgot')">Forgot password?</span>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Log In</button>
      </form>
      <p class="auth-footer">No account? <span class="auth-link" onclick="renderAuth('signup')">Sign up</span></p>
    `;
    $('#loginForm').onsubmit = async e => {
      e.preventDefault();
      const btn = $('#loginBtn');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        const data = await api('/api/auth/login', {
          method:'POST',
          body: JSON.stringify({
            email: $('#loginEmail').value,
            password: $('#loginPass').value,
          }),
        });
        state.user = data.user;
        toast('Welcome back!', 'success');
        showApp();
      } catch (err) {
        toast(err.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Log In';
      }
    };
  }

  else if (mode === 'signup') {
    body.innerHTML = `
      <h2 class="auth-title">Create your account</h2>
      <p class="auth-subtitle">Start sending personalized job emails</p>
      <div class="auth-tabs">
        <div class="auth-tab" onclick="renderAuth('login')">Log In</div>
        <div class="auth-tab active">Sign Up</div>
      </div>
      <form id="signupForm">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" type="text" id="signupName" required autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="signupEmail" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="signupPass" required minlength="8" autocomplete="new-password">
          <div class="password-strength"><div class="password-strength-bar" id="pwBar"></div></div>
          <p style="font-size:10.5px;color:var(--text3);margin-top:4px">Minimum 8 characters</p>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="signupBtn">Create Account</button>
      </form>
      <p class="auth-footer">Already have an account? <span class="auth-link" onclick="renderAuth('login')">Log in</span></p>
    `;
    $('#signupPass').oninput = e => {
      const score = passwordStrength(e.target.value);
      const bar = $('#pwBar');
      const colors = ['#ef4444','#f59e0b','#f59e0b','#10b981','#10b981'];
      bar.style.width = `${(score/4)*100}%`;
      bar.style.background = colors[score] || '#ef4444';
    };
    $('#signupForm').onsubmit = async e => {
      e.preventDefault();
      const btn = $('#signupBtn');
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const data = await api('/api/auth/signup', {
          method:'POST',
          body: JSON.stringify({
            name: $('#signupName').value,
            email: $('#signupEmail').value,
            password: $('#signupPass').value,
          }),
        });
        state.user = data.user;
        toast('Account created!', 'success');
        showApp();
      } catch (err) {
        toast(err.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    };
  }

  else if (mode === 'forgot') {
    body.innerHTML = `
      <h2 class="auth-title">Reset your password</h2>
      <p class="auth-subtitle">We'll email you a link to reset it</p>
      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="forgotEmail" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="forgotBtn">Send Reset Link</button>
      </form>
      <p class="auth-footer">Remembered? <span class="auth-link" onclick="renderAuth('login')">Back to login</span></p>
    `;
    $('#forgotForm').onsubmit = async e => {
      e.preventDefault();
      const btn = $('#forgotBtn');
      btn.disabled = true; btn.textContent = 'Sending...';
      try {
        const data = await api('/api/auth/forgot-password', {
          method:'POST',
          body: JSON.stringify({ email: $('#forgotEmail').value }),
        });
        toast(data.message, 'success');
        setTimeout(() => renderAuth('login'), 2000);
      } catch (err) {
        toast(err.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Send Reset Link';
      }
    };
  }

  else if (mode === 'reset') {
    const token = new URLSearchParams(location.search).get('reset');
    body.innerHTML = `
      <h2 class="auth-title">Set a new password</h2>
      <p class="auth-subtitle">Choose a strong, secure password</p>
      <form id="resetForm">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input class="form-input" type="password" id="resetPass" required minlength="8" autocomplete="new-password">
          <div class="password-strength"><div class="password-strength-bar" id="resetPwBar"></div></div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-input" type="password" id="resetPass2" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="resetBtn">Reset Password</button>
      </form>
    `;
    $('#resetPass').oninput = e => {
      const score = passwordStrength(e.target.value);
      const bar = $('#resetPwBar');
      const colors = ['#ef4444','#f59e0b','#f59e0b','#10b981','#10b981'];
      bar.style.width = `${(score/4)*100}%`;
      bar.style.background = colors[score] || '#ef4444';
    };
    $('#resetForm').onsubmit = async e => {
      e.preventDefault();
      const p1 = $('#resetPass').value, p2 = $('#resetPass2').value;
      if (p1 !== p2) { toast('Passwords do not match', 'error'); return; }
      const btn = $('#resetBtn');
      btn.disabled = true; btn.textContent = 'Resetting...';
      try {
        await api('/api/auth/reset-password', {
          method:'POST',
          body: JSON.stringify({ token, newPassword: p1 }),
        });
        toast('Password reset! Please log in.', 'success');
        history.replaceState({}, '', '/');
        setTimeout(() => renderAuth('login'), 1500);
      } catch (err) {
        toast(err.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Reset Password';
      }
    };
  }
}

function showApp() {
  $('#authScreen').classList.add('hidden');
  $('#appScreen').classList.remove('hidden');
  updateUserDisplay();
  loadUserData();
  render();
}

function showAuth() {
  $('#appScreen').classList.add('hidden');
  $('#authScreen').classList.remove('hidden');
  // Check for reset token in URL
  const params = new URLSearchParams(location.search);
  if (params.get('reset')) {
    renderAuth('reset');
  } else {
    renderAuth('login');
  }
}

function updateUserDisplay() {
  if (!state.user) return;
  $('#userName').textContent = state.user.name || 'User';
  $('#userEmail').textContent = state.user.email;
  $('#userAvatar').textContent = (state.user.name || state.user.email)[0].toUpperCase();
}

async function loadUserData() {
  // Load saved templates
  try {
    const data = await api('/api/templates');
    state.templates = data.templates.length ? data.templates : DEFAULT_TEMPLATES;
  } catch {
    state.templates = DEFAULT_TEMPLATES;
  }

  // Check SMTP status
  try {
    const data = await api('/api/smtp/status');
    state.connected = data.connected;
    if (data.saved) {
      state.smtp.email = data.email;
      state.smtp.host = data.host;
      state.smtp.fromName = data.fromName || '';
    }
  } catch {}
}

async function saveTemplates() {
  // Don't save default templates back
  const customOnly = state.templates.filter(t => !t.id.startsWith('t_default_'));
  try {
    await api('/api/templates', {
      method:'POST',
      body: JSON.stringify({ templates: state.templates }),
    });
  } catch (e) { console.error('Failed to save templates', e); }
}

async function logout() {
  try { await api('/api/auth/logout', { method:'POST' }); } catch {}
  state.user = null;
  state.connected = false;
  state.contacts = [];
  state.selected = new Set();
  showAuth();
  toast('Logged out', 'info');
}

// ACCOUNT MODAL (change password, logout)

function openAccountModal() {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Account Settings</h3>

        <div>
          <div style="font-weight:600">${esc(state.user.name || 'User')}</div>
          <div style="font-size:12px;color:var(--text3)">${esc(state.user.email)}</div>
        </div>
      </div>

      <h4 style="font-size:13px;margin-bottom:12px;color:var(--text2)">Change Password</h4>
      <form id="changePwForm">
        <div class="form-group">
          <label class="form-label">Current Password</label>
          <input class="form-input" type="password" id="curPw" required>
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input class="form-input" type="password" id="newPw" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary btn-sm">Update Password</button>
      </form>

      <hr style="border:none;border-top:1px solid var(--border);margin:22px 0">

      <button class="btn btn-danger btn-block" onclick="logout();this.closest('.overlay').remove()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        Log Out
      </button>

      <div style="text-align:right;margin-top:16px">
        <button class="btn btn-ghost btn-sm" onclick="this.closest('.overlay').remove()">Close</button>
      </div>
    </div>
  `;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);

  overlay.querySelector('#changePwForm').onsubmit = async e => {
    e.preventDefault();
    try {
      await api('/api/auth/change-password', {
        method:'POST',
        body: JSON.stringify({
          currentPassword: overlay.querySelector('#curPw').value,
          newPassword: overlay.querySelector('#newPw').value,

      });
      toast('Password updated!', 'success');
      overlay.remove();
    } catch (err) {
      toast(err.message, 'error');
    }
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// MAIN APP RENDER (tabs, etc.)
// ═══════════════════════════════════════════════════════════════════════════

function switchTab(tab) {
  state.tab = tab;
  $$('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  $('#pageTitle').textContent = titles[tab];
  render();
}

function updateStatus() {
  const dot = $('#statusDot');
  const txt = $('#statusText');
  if (state.connected) {
    dot.classList.add('on');
    txt.textContent = 'SMTP connected';
  } else {
    dot.classList.remove('on');
    txt.textContent = 'Not connected';
  }
  const badge = $('#contactBadge');
  if (state.contacts.length > 0) {
    badge.textContent = state.contacts.length;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

function render() {
  const c = $('#content');
  const actions = $('#topActions');
  actions.innerHTML = '';
  updateStatus();

  switch(state.tab) {
    case 'setup':    renderSetup(c); break;
    case 'contacts': renderContacts(c, actions); break;
    case 'templates':renderTemplates(c); break;
    case 'send':     renderSend(c); break;
  }
}

      <input type="file" id="attachInput" multiple hidden>
      <button class="btn btn-sm" onclick="document.getElementById('attachInput').click()">+ Add Attachment</button>
      <div id="attachList"></div>
    </div>
  `;

  $$('#content .preset').forEach(el => {
    el.onclick = () => {
      const k = el.dataset.key;
      const p = PRESETS[k];
      state.smtp = { ...state.smtp, preset:k, host:p.host, port:p.port, encryption:p.encryption };
      renderSetup(c);
    };
  });

  const sync = () => {
    state.smtp.host = $('#smtpHost').value;
    state.smtp.port = $('#smtpPort').value;
    state.smtp.encryption = $('#smtpEnc').value;
    state.smtp.fromName = $('#smtpName').value;
    state.smtp.email = $('#smtpEmail').value;
    state.smtp.password = $('#smtpPass').value;
  };

  $('#btnConnect').onclick = async () => {
    sync();
    const btn = $('#btnConnect');
    btn.disabled = true; btn.innerHTML = '⏳ Connecting...';
    try {
      const data = await api('/api/smtp/connect', {
        method:'POST', body: JSON.stringify(state.smtp)
      });
      state.connected = true;
      toast('SMTP connected and verified!', 'success');
    } catch(e) {
      toast(e.message, 'error');
    }
    renderSetup(c);
  };

  if ($('#btnDisconnect')) {
    $('#btnDisconnect').onclick = async () => {
      await api('/api/smtp/disconnect', { method:'POST' });
      state.connected = false;
      state.smtp.password = '';
      toast('SMTP disconnected', 'info');
      renderSetup(c);
    };
  }

  $('#delayInput').onchange = e => state.delaySeconds = Math.max(1, parseInt(e.target.value) || 5);

  $('#attachInput').onchange = e => {
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        state.attachments.push({
          filename: file.name,
          content: ev.target.result.split(',')[1],
          size: file.size,
        });
        renderAttachments();
      };
      reader.readAsDataURL(file);
    });
  };
  renderAttachments();
}

function renderAttachments() {
  const list = $('#attachList');
  if (!list) return;
  list.innerHTML = state.attachments.map((a, i) => `
    <div class="att-row">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent2)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      <span class="att-name">${esc(a.filename)}</span>
      <span style="font-size:10px;color:var(--text3)">${(a.size/1024).toFixed(1)} KB</span>
      <button class="btn btn-ghost btn-sm" onclick="removeAttach(${i})" style="padding:3px 6px">✕</button>
    </div>
  `).join('');
}

function removeAttach(i) { state.attachments.splice(i, 1); renderAttachments(); }

// ─── Contacts Tab ────────────────────────────────────────────────────
function renderContacts(c, actions) {
  if (state.contacts.length > 0) {
    actions.innerHTML = `<button class="btn btn-sm" onclick="document.getElementById('fileUpload2').click()">+ Upload More</button>
      <input type="file" id="fileUpload2" accept=".xlsx,.xls,.csv" hidden onchange="handleFileUpload(this.files[0])">`;
  }
  c.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
          Import Contacts
        </div>
        ${state.contacts.length > 0 ? '<button class="btn btn-danger btn-sm" onclick="clearContacts()">✕ Clear All</button>' : ''}
      </div>
      <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileUpload').click()">
        <div class="upload-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        </div>
        <h3>Drop your Excel / CSV file here</h3>
        <p>Supports .xlsx, .xls, .csv — File must have an "email" column</p>
      </div>
      <input type="file" id="fileUpload" accept=".xlsx,.xls,.csv" hidden onchange="handleFileUpload(this.files[0])">
    </div>
    <div id="contactTable"></div>
  `;
  const dz = $('#dropZone');
  dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag'); };
  dz.ondragleave = () => dz.classList.remove('drag');
  dz.ondrop = e => { e.preventDefault(); dz.classList.remove('drag'); handleFileUpload(e.dataTransfer.files[0]); };
  if (state.contacts.length > 0) renderContactTable();
}

async function handleFileUpload(file) {
  if (!file) return;
  const form = new FormData();
  form.append('file', file);
  toast('Uploading...', 'info');
  try {
    const res = await fetch('/api/contacts/upload', { method:'POST', body:form, credentials:'include' });
    const data = await res.json();
    if (res.ok) {
      state.contacts = data.contacts;
      state.columns = data.columns;
      state.emailColumn = data.emailColumn;
      state.selected = new Set(data.contacts.map(c => c._id));
      toast(`Loaded ${data.validContacts} contacts` + (data.invalidSkipped > 0 ? ` (${data.invalidSkipped} skipped)` : ''), 'success');
      render();
    } else {
      toast(data.error, 'error');
    }
  } catch(e) {
    toast('Upload failed: ' + e.message, 'error');
  }
}

function clearContacts() { state.contacts = []; state.columns = []; state.selected = new Set(); render(); }

function renderContactTable() {
  const ct = $('#contactTable');
  if (!ct || !state.contacts.length) return;
  const cols = state.columns;
  const show = state.contacts.slice(0, 100);
  ct.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          ${state.contacts.length} Contacts
          <span class="tag tag-blue">${state.selected.size} selected</span>
        </div>
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr>
            <th style="width:40px;text-align:center">
              <div class="cb ${state.selected.size===state.contacts.length?'on':''}" onclick="toggleAll()">
                ${state.selected.size===state.contacts.length?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>':''}
              </div>
            </th>
            ${cols.map(col => `<th>${esc(col)}</th>`).join('')}
          </tr></thead>
          <tbody>
            ${show.map(row => `
              <tr>
                <td style="text-align:center">
                  <div class="cb ${state.selected.has(row._id)?'on':''}" onclick="toggleOne('${row._id}')">
                    ${state.selected.has(row._id)?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>':''}
                  </div>
                </td>
                ${cols.map(col => `<td title="${esc(String(row[col]||''))}">${esc(String(row[col]||''))}</td>`).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      ${state.contacts.length > 100 ? `<p style="font-size:11px;color:var(--text3);margin-top:8px;text-align:center">Showing first 100 of ${state.contacts.length}</p>` : ''}
    </div>
  `;
}

function toggleAll() {
  state.selected = state.selected.size === state.contacts.length ? new Set() : new Set(state.contacts.map(c => c._id));
  renderContactTable(); updateStatus();
}
function toggleOne(id) {
  state.selected.has(id) ? state.selected.delete(id) : state.selected.add(id);
  renderContactTable(); updateStatus();
}

// ─── Templates Tab ────────────────────────────────────────────────────
function renderTemplates(c) {
  const tpl = state.templates.find(t => t.id === state.activeTemplate);
  const allVars = tpl ? [...new Set([...getVars(tpl.subject), ...getVars(tpl.body)])] : [];
  const customVars = allVars.filter(v => !state.columns.includes(v));

  c.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Email Templates
        </div>
        <button class="btn btn-primary btn-sm" onclick="openTemplateModal()">+ New Template</button>
      </div>
      <div class="tpl-grid">
        ${state.templates.map(t => `
          <div class="tpl-card ${state.activeTemplate===t.id?'active':''}" onclick="selectTemplate('${t.id}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <h4>${esc(t.name)}</h4>

                <button class="btn btn-ghost btn-sm" style="padding:3px" onclick="event.stopPropagation();editTemplate('${t.id}')">✎</button>

            </div>
            <p>${esc(t.subject)}</p>

          <div class="card-title">

            Preview: ${esc(tpl.name)}
          </div>
          <button class="btn btn-sm" onclick="sendTestEmail()">Send Test</button>
        </div>
        ${customVars.length > 0 ? `
          <div style="margin-bottom:18px">
            <label class="form-label">Set Global Variables</label>
            <div class="form-row" style="grid-template-columns:repeat(auto-fill,minmax(190px,1fr))">
              ${customVars.map(v => `
                <div class="form-group" style="margin-bottom:6px">
                  <label style="font-size:10px;color:var(--text3);font-family:var(--mono)">{{${v}}}</label>
                  <input class="form-input" placeholder="${v}" value="${esc(state.variables[v]||'')}" style="margin-top:3px" oninput="state.variables['${v}']=this.value;updatePreview()">

          <div class="preview-body">${esc(fillTemplate(tpl.body, state.contacts[0]||{}))}</div>
        </div>
        <div class="vars">
          <span style="font-size:10.5px;color:var(--text3);align-self:center;margin-right:3px">Variables:</span>

    ` : ''}
  `;

function selectTemplate(id) { state.activeTemplate = id; renderTemplates($('#content')); }
function deleteTemplate(id) {
  state.templates = state.templates.filter(t => t.id !== id);
  if (state.activeTemplate === id) state.activeTemplate = null;
  saveTemplates();
  toast('Template deleted', 'info');
  renderTemplates($('#content'));
}
function editTemplate(id) { openTemplateModal(state.templates.find(x => x.id === id)); }

function updatePreview() {
  const tpl = state.templates.find(t => t.id === state.activeTemplate);
  if (!tpl) return;
  const box = $('#previewBox');
  if (!box) return;
  box.innerHTML = `
    <div class="preview-subj">Subject: ${esc(fillTemplate(tpl.subject, state.contacts[0]||{}))}</div>
    <div class="preview-body">${esc(fillTemplate(tpl.body, state.contacts[0]||{}))}</div>
  `;
}

function openTemplateModal(existing) {
  const t = existing || { id:'', name:'', subject:'', body:'' };
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <h3>${t.id ? 'Edit Template' : 'New Template'}</h3>
      <div class="form-group">
        <label class="form-label">Template Name</label>
        <input class="form-input" id="tplName" value="${esc(t.name)}">
      </div>
      <div class="form-group">
        <label class="form-label">Subject Line</label>
        <input class="form-input" id="tplSubject" value="${esc(t.subject)}">
      </div>
      <div class="form-group">
        <label class="form-label">Email Body</label>
        <textarea class="form-textarea" id="tplBody" rows="10">${esc(t.body)}</textarea>
      </div>
      ${state.columns.length ? `
        <div style="margin-bottom:14px">
          <label class="form-label">Insert from spreadsheet columns</label>
          <div class="vars">
            ${state.columns.map(col => `<span class="var-chip" onclick="document.getElementById('tplBody').value+='{{${col}}}'">{{${col}}}</span>`).join('')}
          </div>
        </div>
      ` : ''}
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="this.closest('.overlay').remove()">Cancel</button>
        <button class="btn btn-primary" id="tplSave">✓ Save</button>
      </div>
    </div>
  `;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
  overlay.querySelector('#tplSave').onclick = () => {
    const name = overlay.querySelector('#tplName').value.trim();
    const subject = overlay.querySelector('#tplSubject').value.trim();
    const body = overlay.querySelector('#tplBody').value;
    if (!name || !subject) { toast('Name and subject required', 'error'); return; }
    if (t.id) {
      const idx = state.templates.findIndex(x => x.id === t.id);
      state.templates[idx] = { ...t, name, subject, body };
    } else {
      state.templates.push({ id:'t'+Date.now(), name, subject, body });
    }
    saveTemplates();
    overlay.remove();
    toast('Template saved', 'success');
    renderTemplates($('#content'));
  };
}

async function sendTestEmail() {
  const tpl = state.templates.find(t => t.id === state.activeTemplate);
  if (!tpl) return;
  if (!state.connected) { toast('Connect SMTP first', 'error'); return; }
  const to = prompt('Send test email to:');
  if (!to) return;
  try {
    await api('/api/email/test', {
      method:'POST',
      body: JSON.stringify({
        to,
        subject: fillTemplate(tpl.subject, state.contacts[0]||{}),
        body: fillTemplate(tpl.body, state.contacts[0]||{}),
      }),
    });
    toast(`Test email sent to ${to}!`, 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// ─── Send Tab ────────────────────────────────────────────────────────
function renderSend(c) {
  const s = state.sending;
  const tpl = state.templates.find(t => t.id === state.activeTemplate);
  const ready = state.connected && tpl && state.selected.size > 0;

  c.innerHTML = `
    <div class="stats">
      <div class="stat">

        <div class="stat-val" style="color:var(${state.connected?'--green':'--red'})">${state.connected?'Ready':'N/A'}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Selected</div>
        <div class="stat-val" style="color:var(--accent2)">${state.selected.size}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Sent</div>
        <div class="stat-val" style="color:var(--green)">${s.sent}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Failed</div>
        <div class="stat-val" style="color:var(--red)">${s.failed}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
          Send Emails
        </div>
      </div>

      ${!state.connected ? '<div class="alert-box err">⚠ SMTP not connected — go to Mail Setup</div>' : ''}
      ${!tpl ? '<div class="alert-box warn">⚠ No template selected — go to Templates</div>' : ''}
      ${state.selected.size===0 ? '<div class="alert-box warn">⚠ No contacts selected — go to Contacts</div>' : ''}

      ${ready ? `
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
          <button class="btn btn-primary" id="btnSend" ${s.active?'disabled':''}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
            ${s.active ? 'Sending...' : `Send to ${state.selected.size} contacts`}
          </button>
          <span style="font-size:11.5px;color:var(--text3)">
            Template: <strong style="color:var(--text)">${esc(tpl.name)}</strong> · Delay: ${state.delaySeconds}s
            ${state.attachments.length ? ` · ${state.attachments.length} attachment(s)` : ''}
          </span>
        </div>
      ` : ''}

      ${(s.active || s.logs.length > 0) ? `
        <div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--text2);margin-bottom:3px">
          <span>Progress: ${s.progress} / ${s.total}</span>
          <span>${s.total > 0 ? Math.round(s.progress/s.total*100) : 0}%</span>
        </div>
        <div class="prog-wrap"><div class="prog-bar" style="width:${s.total>0?(s.progress/s.total*100):0}%"></div></div>
      ` : ''}

      ${s.logs.length > 0 ? `
        <div style="margin-top:14px">
          <label class="form-label">Activity Log</label>
          <div class="log" id="logBox">
            ${s.logs.map(l => `
              <div class="log-row ${l.type==='sent'?'ok':l.type==='failed'?'err':'info'}">
                <span class="log-time">${l.time}</span>
                <span class="log-msg">${esc(l.msg)}</span>
              </div>
            `).join('')}
          </div>
        </div>
      ` : ''}
    </div>
  `;

  if ($('#btnSend')) $('#btnSend').onclick = startBulkSend;
}

async function startBulkSend() {
  const tpl = state.templates.find(t => t.id === state.activeTemplate);
  if (!tpl) return;
  const targets = state.contacts.filter(c => state.selected.has(c._id));
  state.sending = { active:true, progress:0, total:targets.length, sent:0, failed:0, logs:[] };
  renderSend($('#content'));
  try {
    const res = await fetch('/api/email/send-bulk', {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contacts: targets,
        subject: tpl.subject,
        body: tpl.body,
        delaySeconds: state.delaySeconds,
        attachments: state.attachments,
      }),
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          const now = new Date().toLocaleTimeString();
          if (evt.type === 'sent') {
            state.sending.sent = evt.sent; state.sending.failed = evt.failed;
            state.sending.progress = evt.sent + evt.failed;
            state.sending.logs.push({ time:now, type:'sent', msg:`✓ Sent to ${evt.email}` });
          } else if (evt.type === 'failed') {
            state.sending.sent = evt.sent; state.sending.failed = evt.failed;
            state.sending.progress = evt.sent + evt.failed;
            state.sending.logs.push({ time:now, type:'failed', msg:`✕ Failed: ${evt.email} — ${evt.error}` });
          } else if (evt.type === 'complete') {
            state.sending.active = false;
            state.sending.logs.push({ time:now, type:'info', msg:evt.message });
            toast('Sending complete!', 'success');
          } else if (evt.type === 'error') {
            state.sending.active = false;
            state.sending.logs.push({ time:now, type:'failed', msg:evt.message });
            toast(evt.message, 'error');
          } else if (evt.type === 'start') {
            state.sending.logs.push({ time:now, type:'info', msg:evt.message });
          }
          renderSend($('#content'));
          const log = $('#logBox'); if (log) log.scrollTop = log.scrollHeight;
        } catch(e) {}
      }
    }
  } catch(e) {
    state.sending.active = false;
    toast('Connection error: ' + e.message, 'error');
    renderSend($('#content'));
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
(async function init() {
  // Check if URL has reset token → show reset form
  const params = new URLSearchParams(location.search);
  if (params.get('reset')) { showAuth(); return; }

  // Check if user is already logged in
  try {
    const data = await api('/api/auth/me');
    state.user = data.user;
    showApp();
  } catch {
    showAuth();
  }
})();
</script>
